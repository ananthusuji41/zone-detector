<!DOCTYPE html>
<html>
<head>
    <title>Zone Detector - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            border: 1px solid #2a2a2a;
        }
        h2 {
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 22px;
        }
        p {
            color: #888;
            margin-bottom: 28px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: #e63946; }
        button {
            width: 100%;
            padding: 13px;
            background: #e63946;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #c1121f; }
        .error {
            background: #3a0000;
            color: #ff6b6b;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Zone Detector</h2>
        <p>Surveillance dashboard — authorised access only</p>
        {% if error %}
        <div class="error">Wrong username or password. Try again.</div>
        {% endif %}
        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Username" required autofocus/>
            <input type="password" name="password" placeholder="Password" required/>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
